spring.application.name=auth
# Puerto del microservicio de autenticación (8051 en Docker / desarrollo local)
server.port=8051

# Conexión a Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Clave secreta para firmar el JWT (En producción esto va en variables de entorno)
jwt.secret=${JWT_SECRET:UnaClaveSuperSecretaYMuyLargaParaPoderFirmarElTokenCorrectamente12345}
# Expiración del JWT en milisegundos (86400000 = 24 h)
jwt.expiration=86400000
# Clave compartida para llamadas internas entre microservicios (HU5 / administración).
internal.api.token=${INTERNAL_API_TOKEN:dev-internal-token}

# Cuenta admin: solo el correo configurado puede tener rol "admin" (validado en login).
# Si app.admin.enabled=true, se crea en BD al arrancar si no existe (solo entornos controlados).
app.admin.email=${APP_ADMIN_EMAIL:admin@boh.cl}
app.admin.password=${APP_ADMIN_PASSWORD:Admin123!}
app.admin.enabled=${APP_ADMIN_ENABLED:false}

ms.administracion.base-url=${MS_ADMINISTRACION_BASE_URL:http://localhost:8052}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never