<div class="dashboard-layout apoderado-theme">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="brand-text">
        <h2>Portal Apoderado</h2>
        <span>C. B. O'HIGGINS</span>
      </div>
    </div>

    <nav class="sidebar-menu">
      <a routerLink="/apoderado" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="menu-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </a>
      <a routerLink="/apoderado/asistencia" routerLinkActive="active" class="menu-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Asistencia
      </a>
      <a routerLink="/apoderado/calificaciones" routerLinkActive="active" class="menu-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Calificaciones
      </a>
      <a routerLink="/apoderado/anotaciones" routerLinkActive="active" class="menu-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Anotaciones
      </a>
      <a routerLink="/apoderado/mis-datos" routerLinkActive="active" class="menu-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mis datos
      </a>
      <a routerLink="/apoderado/mensajes" routerLinkActive="active" class="menu-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Mensajes
        @if (notificacionesNuevas() > 0) {
          <span class="badge-red">{{ notificacionesNuevas() }}</span>
        }
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#" class="menu-item logout" (click)="cerrarSesion($event)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </a>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <span style="color:#64748b;font-size:0.9rem;">Familia y comunicaciones escolares</span>
      </div>
      <div class="topbar-right">
        <button type="button" class="icon-btn notification" (click)="irMensajes()" title="Ver mensajes">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          @if (notificacionesNuevas() > 0) {
            <span class="badge-red" style="position:absolute;top:2px;right:2px;font-size:0.65rem;padding:2px 5px;">{{ notificacionesNuevas() }}</span>
          }
        </button>
        <div class="user-profile">
          <span class="user-name">Hola, {{ nombreVisible() }}</span>
          <div class="user-avatar">{{ iniciales() }}</div>
        </div>
      </div>
    </header>

    <main class="dashboard-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
