# Libro de Clases Digital — Colegio Bernardo O'Higgins
# Despliegue productivo con límites estrictos de CPU/RAM y frontend integrado.
#
# Uso:
#   cd Contenedores
#   docker compose up -d --build

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-api-health: &api-health
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 90s

services:
  mysql:
    image: mysql:8.0
    pull_policy: always
    container_name: mysql-colegio-boh
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: db_usuarios
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 15
    volumes:
      - mysql-colegio-data:/var/lib/mysql
      # Ajuste de ruta: Asume que se ejecuta desde la carpeta Contenedores
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 512M

  auth-api:
    build:
      context: ..
      dockerfile: Contenedores/Contenedor - ms_auth/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8051:8051"
    environment:
      SERVER_PORT: 8051
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_usuarios?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-UnaClaveSuperSecretaYMuyLargaParaPoderFirmarElTokenCorrectamente12345}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      APP_ADMIN_ENABLED: "true"
      APP_ADMIN_EMAIL: "${APP_ADMIN_EMAIL:-admin@boh.cl}"
      APP_ADMIN_PASSWORD: "${APP_ADMIN_PASSWORD:-Admin123!}"
      MS_ADMINISTRACION_BASE_URL: http://admin-api:8052
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      <<: *api-health
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8051/actuator/health | grep -q UP"]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 256M

  admin-api:
    build:
      context: ..
      dockerfile: Contenedores/Contenedor - ms_administracion/Dockerfile
    container_name: admin-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8052:8052"
    environment:
      SERVER_PORT: 8052
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_administracion?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-UnaClaveSuperSecretaYMuyLargaParaPoderFirmarElTokenCorrectamente12345}
      MS_AUTH_BASE_URL: http://auth-api:8051
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
    depends_on:
      mysql:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      <<: *api-health
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8052/actuator/health | grep -q UP"]
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.20"
          memory: 384M

  academico-api:
    build:
      context: ..
      dockerfile: Contenedores/Contenedor - ms_academico/Dockerfile
    container_name: academico-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8053:8053"
    environment:
      SERVER_PORT: 8053
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_academico?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-UnaClaveSuperSecretaYMuyLargaParaPoderFirmarElTokenCorrectamente12345}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      MS_ADMINISTRACION_BASE_URL: http://admin-api:8052
      MS_MENSAJERIA_BASE_URL: http://mensajeria-api:8056
    depends_on:
      mysql:
        condition: service_healthy
      admin-api:
        condition: service_healthy
    healthcheck:
      <<: *api-health
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8053/actuator/health | grep -q UP"]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 256M

  asistencia-api:
    build:
      context: ..
      dockerfile: Contenedores/Contenedor - ms_asistencia/Dockerfile
    container_name: asistencia-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8054:8054"
    environment:
      SERVER_PORT: 8054
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_asistencia?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-UnaClaveSuperSecretaYMuyLargaParaPoderFirmarElTokenCorrectamente12345}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      MS_ADMINISTRACION_BASE_URL: http://admin-api:8052
      MS_MENSAJERIA_BASE_URL: http://mensajeria-api:8056
    depends_on:
      mysql:
        condition: service_healthy
      admin-api:
        condition: service_healthy
    healthcheck:
      <<: *api-health
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8054/actuator/health | grep -q UP"]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 448M
        reservations:
          cpus: "0.10"
          memory: 224M

  conducta-api:
    build:
      context: ..
      dockerfile: Contenedores/Contenedor - ms_conducta/Dockerfile
    container_name: conducta-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8055:8055"
    environment:
      SERVER_PORT: 8055
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_conducta?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-UnaClaveSuperSecretaYMuyLargaParaPoderFirmarElTokenCorrectamente12345}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      MS_ADMINISTRACION_BASE_URL: http://admin-api:8052
      MS_AUTENTICACION_BASE_URL: http://auth-api:8051
      MS_MENSAJERIA_BASE_URL: http://mensajeria-api:8056
    depends_on:
      mysql:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      mensajeria-api:
        condition: service_healthy
    healthcheck:
      <<: *api-health
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8055/actuator/health | grep -q UP"]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 448M
        reservations:
          cpus: "0.10"
          memory: 224M

  mensajeria-api:
    build:
      context: ..
      dockerfile: Contenedores/Contenedor - ms_mensajeria/Dockerfile
    container_name: mensajeria-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8056:8056"
    environment:
      SERVER_PORT: 8056
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_mensajeria?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-UnaClaveSuperSecretaYMuyLargaParaPoderFirmarElTokenCorrectamente12345}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      MS_ADMINISTRACION_BASE_URL: http://admin-api:8052
      MS_AUTH_BASE_URL: http://auth-api:8051
    depends_on:
      mysql:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      <<: *api-health
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8056/actuator/health | grep -q UP"]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 256M

  frontend:
    build:
      context: ..
      dockerfile: Contenedores/Contenedor - frontend/Dockerfile
    container_name: libro-clases-frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      # Ajuste: se elimina el 127.0.0.1 para que el contenedor exponga el puerto a cualquier red.
      - "${FRONTEND_PORT:-8050}:80"
    depends_on:
      auth-api:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      academico-api:
        condition: service_healthy
      asistencia-api:
        condition: service_healthy
      conducta-api:
        condition: service_healthy
      mensajeria-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 64M

volumes:
  mysql-colegio-data: