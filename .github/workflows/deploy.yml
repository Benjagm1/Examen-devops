name: CI/CD - Libro de Clases Digital

on:
  push:
    branches: [ "main" ] # Se activa al hacer push a la rama principal

env:
  AWS_REGION: us-east-1 # La región por defecto de AWS Academy

jobs:
  # ==========================================
  # JOB 1: COMPILACIÓN Y DESPLIEGUE DE BACKEND
  # ==========================================
  build-and-push-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Definimos una matriz con el nombre de cada microservicio
        service: [
          'ms-auth',
          'ms-administracion',
          'ms-academico',
          'ms-asistencia',
          'ms-conducta',
          'ms-mensajeria'
        ]
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Permite revisar el commit anterior para ver qué cambió

      # OPTIMIZACIÓN: Revisar si este microservicio en específico cambió
      - name: Verificar cambios en el servicio
        id: check_changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "Stack/Backend/${{ matrix.service }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # El resto de los pasos de este servicio solo se ejecutan si hubo cambios reales
      - name: Configurar credenciales de AWS
        if: steps.check_changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Autenticar en Amazon ECR
        if: steps.check_changes.outputs.changed == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Construir y Subir Imagen a ECR
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Contenedores/Contenedor - ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # JOB 2: COMPILACIÓN Y DESPLIEGUE DE FRONTEND
  # ==========================================
  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verificar cambios en el Frontend
        id: check_frontend
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "Stack/frontend/frontend-bo/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar credenciales de AWS
        if: steps.check_frontend.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Autenticar en Amazon ECR
        if: steps.check_frontend.outputs.changed == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir y Subir Frontend a ECR
        if: steps.check_frontend.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Contenedores/Contenedor - frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/libro-clases-frontend:latest
            ${{ steps.login-ecr.outputs.registry }}/libro-clases-frontend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max